name: Branch
on:
  push:
    branches-ignore:
      - "master"
  workflow_dispatch:

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: "👀"
    uses: ./.github/workflows/all_tests.yml
    secrets: inherit
  trivy:
    name: Trivy
    uses: ./.github/workflows/trivy_check.yml
