name: Run smoketests
on:
  schedule:
    - cron: "30 5-12 * * SUN-SAT"
  workflow_dispatch:

env:
  PNPM_FROZEN_FLAG: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'renovate[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

jobs:
  smoketests:
    name:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          # Pinned to 24.15.0 because 24.16.0 has a bug in extract-zip
          # that silently truncates Chrome extraction, breaking
          # `puppeteer browsers install chrome`. See nodejs/node#63487.
          node-version: "24.17.0"

      - uses: ./.github/actions/setup_pnpm_cache

      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          max_attempts: 5
          timeout_minutes: 5
          retry_wait_seconds: 120
          command: |
            cd smoketests
            pnpm install $PNPM_FROZEN_FLAG

      - name: Install Puppeteer browser
        run: |
          cd smoketests
          pnpm exec puppeteer browsers install chrome

      - name: Test kansalaisen näkymä testiopintopolussa
        run: cd smoketests && pnpm run qa:kansalainen

      - name: Test omadata-oauth2-sample testiopintopolussa
        run: cd smoketests && pnpm run omadata:qa

      - name: Test kielitutkintotodistus tiedote flow
        env:
          KOSKI_BASE_URL: https://koski.testiopintopolku.fi/koski
          KOSKI_USER: ${{ secrets.KOSKI_USER_USERNAME }}
          KOSKI_PASS: ${{ secrets.KOSKI_USER_PASSWORD }}
          TIEDOTE_SMOKETEST_OO_OID: "1.2.246.562.15.98526955087"
        run: cd smoketests && pnpm run qa:tiedote

      - name: Report failure
        uses: ravsamhq/notify-slack-action@02b169fd81108a34dbb029df4a41dd27ad680290
        if: ${{ failure() }}
        with:
          status: ${{ job.status }}
          notification_title: "Run smoketests: failure in kansalainen/omadata/tiedote tests"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
