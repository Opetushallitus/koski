name: "👀OAuth2"

on:
  workflow_call:
    inputs:
      runs-on:
        type: string
        default: "ubuntu-latest"

env:
  DOCKER_BUILDKIT: 1
  TZ: Europe/Helsinki
  PNPM_FROZEN_FLAG: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'renovate[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

jobs:
  test-server:
    name: OAuth2 server
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup_pnpm_cache
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: "omadata-oauth2-sample/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "omadata-oauth2-sample/server/pnpm-lock.yaml"
      - run: cd omadata-oauth2-sample/server && pnpm install $PNPM_FROZEN_FLAG
      - run: cd omadata-oauth2-sample/server && pnpm run lint
      - run: cd omadata-oauth2-sample/server && pnpm run build
      # TODO add test step when there are tests
  test-e2e:
   name: OAuth2 E2E ${{matrix.shardIndex}}/${{matrix.shardTotal}}
   runs-on: ${{ inputs.runs-on }}
   permissions:
     contents: read
   strategy:
     fail-fast: false
     matrix:
       shardIndex: [1]
       shardTotal: [1]
   if: ${{ !contains(github.event.head_commit.message, '[skip-tests]') }}
   steps:
     - name: Checkout
       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

     - name: Generate  test certificates
       run: bash omadata-oauth2-sample/server/testca/generate-certs.sh

     - uses: ./.github/actions/omadataoauth2_e2e_test
       with:
         shardIndex: ${{ matrix.shardIndex }}
         shardTotal: ${{ matrix.shardTotal }}
