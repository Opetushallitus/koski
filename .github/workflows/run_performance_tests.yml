name: Run performance tests
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  KOSKI_SERVER_COUNT: 2
  KOSKI_USER: ${{ secrets.KOSKI_USER_USERNAME }}
  KOSKI_PASS: ${{ secrets.KOSKI_USER_PASSWORD }}

  KOSKI_BASE_URL: https://koski.testiopintopolku.fi/koski
  VIRKAILIJA: https://virkailija.testiopintopolku.fi

jobs:
  random_get_light:
    name: random-get-light
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup_java_17

      - uses: ./.github/actions/setup_pnpm_cache

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.15.0"

      - name: Build
        run: mvn test-compile

      - name: Run perftest randomget-light
        run: |
          export PERFTEST_THREADS=2
          mvn exec:java -Dexec.mainClass="fi.oph.koski.perftest.RandomOpiskeluoikeusGetter"

      - name: Report failure
        uses: ravsamhq/notify-slack-action@02b169fd81108a34dbb029df4a41dd27ad680290
        if: ${{ failure() }}
        with:
          status: ${{ job.status }}
          notification_title: "Run performance tests: failure in randomget-light"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  insert_light:
    needs: [random_get_light]
    name: insert-light
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup_java_17

      - uses: ./.github/actions/setup_pnpm_cache

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.15.0"

      - name: Build
        run: mvn test-compile

      - name: Run perftest insert-light
        run: |
          export PERFTEST_THREADS=4
          mvn exec:java -Dexec.mainClass="fi.oph.koski.perftest.MixedOpiskeluoikeusInserterUpdater"

      - name: Report failure
        uses: ravsamhq/notify-slack-action@02b169fd81108a34dbb029df4a41dd27ad680290
        if: ${{ failure() }}
        with:
          status: ${{ job.status }}
          notification_title: "Run performance tests: failure in insert-light"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  mixed-overload:
    needs: [insert_light]
    name: mixed-overload
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup_java_17

      - uses: ./.github/actions/setup_pnpm_cache

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.15.0"

      - name: Build
        run: mvn test-compile

      - name: Run perftest mixed-overload
        run: |
          export PERFTEST_THREADS=100
          mvn exec:java -Dexec.mainClass="fi.oph.koski.perftest.MixedPerfTester"

      - name: Report failure
        uses: ravsamhq/notify-slack-action@02b169fd81108a34dbb029df4a41dd27ad680290
        if: ${{ failure() }}
        with:
          status: ${{ job.status }}
          notification_title: "Run performance tests: failure in mixed-overload"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  yki-todistus-generation:
    needs: [insert_light]
    name: yki-todistus-generation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup_java_17

      - uses: ./.github/actions/setup_pnpm_cache

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.15.0"

      - name: Build
        run: mvn test-compile

      - name: Generate YKI test data (if not exists)
        run: |
          if [ ! -f src/test/resources/yki_perftest_opiskeluoikeus_oids.txt ]; then
            export YKI_PERFTEST_OPPIJA_COUNT=200
            mvn exec:java -Dexec.mainClass="fi.oph.koski.perftest.YleinenKielitutkintoOppijatGenerator"
          else
            echo "Test data file already exists, skipping generation"
          fi

      - name: Upload test data as artifact (for initial setup)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: yki-perftest-data
          path: src/test/resources/yki_perftest_opiskeluoikeus_oids.txt
          retention-days: 30

      - name: Run perftest yki-todistus-generation
        run: |
          export PERFTEST_THREADS=5
          export PERFTEST_ROUNDS=50
          export WARMUP_ROUNDS=5
          export PERFTEST_SUCCESS_THRESHOLD_PERCENTAGE=95
          export PERFTEST_MIN_THROUGHPUT=0.5
          export YKI_TODISTUS_POLL_INTERVAL_MS=1000
          export YKI_TODISTUS_MAX_WAIT_MS=300000
          export YKI_TODISTUS_DIGITAL_WEIGHT=95
          mvn exec:java -Dexec.mainClass="fi.oph.koski.perftest.YleinenKielitutkintoTodistusGenerator"

      - name: Report failure
        uses: ravsamhq/notify-slack-action@02b169fd81108a34dbb029df4a41dd27ad680290
        if: ${{ failure() }}
        with:
          status: ${{ job.status }}
          notification_title: "Run performance tests: failure in yki-todistus-generation"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
