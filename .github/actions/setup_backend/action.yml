runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup_pnpm_cache
    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: "24.17.0"

    - name: Configure sysctl limits for OpenSearch
      run: |
        sudo swapoff -a
        sudo sysctl -w vm.swappiness=1
        sudo sysctl -w fs.file-max=262144
        sudo sysctl -w vm.max_map_count=262144
      shell: bash

    - name: Start Postgres and OS containers
      run: docker compose --progress quiet up -d
      shell: bash

    - name: Restore target dir
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
      with:
        path: "target/"
        key: ${{ runner.os }}-target-${{ github.sha }}
        fail-on-cache-miss: "true"
